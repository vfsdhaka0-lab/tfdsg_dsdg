name: Bootstrap Flutter Project
on: [push, workflow_dispatch]
jobs:
  bootstrap:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
      - name: Create Flutter Project
        run: |
          find . -maxdepth 1 ! -name '.github' ! -name '.' -exec rm -rf {} +
          flutter create --org com.aman.miah --project-name tfdsg_dsdg --platforms android,web .
          git config --global user.name "github-actions[bot]"
          git config --global user.email "actions@github.com"
          git add .
          git commit -m "Initialize project with org: com.aman.miah"
          git push
